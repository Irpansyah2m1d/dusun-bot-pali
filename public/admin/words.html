<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moderasi Kosakata | Admin Dusun PALI</title>
    <link rel="stylesheet" href="/admin/admin-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/admin/auth-check.js"></script>
</head>
<body>
    <aside class="sidebar">
        <div class="logo-area">
            <div class="stat-icon" style="margin-bottom: 0; padding:10px; width: 45px; height: 45px;">
                <i class="fas fa-robot"></i>
            </div>
            <h2><span>Dusun Bot</span></h2>
        </div>
        <nav class="nav-menu">
            <a href="/admin/index.html" class="nav-link"><i class="fas fa-gauge-high"></i> <span>Dashboard</span></a>
            <a href="/admin/words.html" class="nav-link active"><i class="fas fa-language"></i> <span>Kosa Kata</span></a>
            <a href="/admin/folklore.html" class="nav-link"><i class="fas fa-scroll"></i> <span>Cerita Rakyat</span></a>
            <a href="/admin/nasehat.html" class="nav-link"><i class="fas fa-comment-dots"></i> <span>Nasehat</span></a>
            <a href="/admin/knowledge.html" class="nav-link"><i class="fas fa-brain"></i> <span>Pengetahuan AI</span></a>
            <a href="/admin/ai-learned.html" class="nav-link"><i class="fas fa-graduation-cap"></i> <span>Hasil Belajar AI</span></a>
            <a href="/admin/settings.html" class="nav-link"><i class="fas fa-gear"></i> <span>Settings</span></a>
        </nav>
        <div class="sidebar-footer">
            <a href="/" class="nav-link"><i class="fas fa-house"></i> <span>Ke Website</span></a>
            <div class="nav-link" onclick="logout()" style="color: #ef4444;"><i class="fas fa-power-off"></i> <span>Logout</span></div>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="topbar">
            <div class="page-title"><h1>Moderasi Kosakata</h1></div>
            <div class="top-actions">
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=Admin+PALI&background=10b981&color=fff" alt="Avatar">
                    <span style="font-weight: 700;">Admin PALI</span>
                </div>
            </div>
        </header>

        <main class="content-area">
            <div class="dashboard-card">
                <div class="card-header" style="flex-direction: column; align-items: flex-start; gap: 15px;">
                    <h3><i class="fas fa-language"></i> Manajemen Kosakata</h3>
                    <div class="tab-group" style="display: flex; gap: 10px; width: 100%;">
                        <button class="btn-dash btn-dash-primary tab-btn active" onclick="switchTab('usulan')">Antrian Usulan</button>
                        <button class="btn-dash btn-dash-edit tab-btn" onclick="switchTab('kamus')">Semua Database Kamus</button>
                    </div>
                </div>
                
                <!-- Section: Usulan -->
                <div id="usulanSection">
                    <div id="wordsList" class="loading-state">Sedang memuat usulan...</div>
                </div>

                <!-- Section: Kamus Utama -->
                <div id="kamusSection" class="hidden">
                    <div style="margin-bottom: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 12px; border: 1px solid var(--glass-border);">
                        <h4 style="margin-bottom: 10px;"><i class="fas fa-file-import"></i> Tambah Data Massal (JSON)</h4>
                        <div class="input-group full">
                            <textarea id="jsonInput" class="dash-input" style="height: 120px; font-family: monospace; font-size: 0.8rem;" placeholder='[{"indonesia": "makan", "dusun": "mangan", "contoh_id": "Saya makan nasi.", "contoh_dusun": "Aku mangan nasi."}]'></textarea>
                        </div>
                        <div style="display: flex; gap: 10px; margin-top: 10px;">
                            <button class="btn-dash btn-dash-primary" onclick="importJSON()">
                                <i class="fas fa-upload"></i> Import JSON
                            </button>
                            <label class="btn-dash btn-dash-edit" style="cursor: pointer; margin-bottom: 0;">
                                <i class="fas fa-file-code"></i> Upload File JSON <input type="file" id="jsonFile" hidden accept=".json">
                            </label>
                        </div>
                    </div>
                    <div id="kamusTableContainer" class="loading-state">Sedang memuat database kamus...</div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Modal Edit Kosa Kata -->
    <div id="editModal" class="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); z-index:9999; align-items:center; justify-content:center; padding: 20px;">
        <div class="modal-content" style="background:#1e293b; padding:30px; border-radius:30px; width:100%; max-width:600px; border:1px solid rgba(255,255,255,0.1); max-height: 90vh; overflow-y: auto;">
            <h2 style="margin-bottom: 25px;"><i class="fas fa-edit"></i> Edit Kosa Kata</h2>
            <input type="hidden" id="edit-id">
            <div class="input-group">
                <label>Bahasa Indonesia</label>
                <input type="text" id="edit-indo" class="dash-input" placeholder="Indonesia">
            </div>
            <div class="input-group">
                <label>Bahasa Dusun PALI</label>
                <input type="text" id="edit-dusun" class="dash-input" placeholder="Dusun">
            </div>
            <div class="input-group">
                <label>Contoh Kalimat (Indo)</label>
                <input type="text" id="edit-contoh-id" class="dash-input" placeholder="Contoh Indonesia">
            </div>
            <div class="input-group">
                <label>Contoh Kalimat (Dusun)</label>
                <input type="text" id="edit-contoh-dusun" class="dash-input" placeholder="Contoh Dusun">
            </div>
            <div class="input-group">
                <label>Update Audio (MP3)</label>
                <input type="file" id="edit-audio" class="dash-input" accept="audio/mpeg,audio/mp3">
                <small id="current-audio" style="color: var(--text-dim);"></small>
            </div>
            <div style="display:flex; gap:12px; margin-top:30px;">
                <button class="btn-dash btn-dash-primary" onclick="saveEdit()" style="flex:1; justify-content:center; padding: 15px;">Simpan Perubahan</button>
                <button class="btn-dash btn-dash-secondary" onclick="closeEditModal()" style="padding: 15px;">Batal</button>
            </div>
        </div>
    </div>

    <script>
        const password = localStorage.getItem('admin_password');
        let currentTab = 'usulan';

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if(tab === 'usulan') {
                document.getElementById('usulanSection').classList.remove('hidden');
                document.getElementById('kamusSection').classList.add('hidden');
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                loadWords();
            } else {
                document.getElementById('usulanSection').classList.add('hidden');
                document.getElementById('kamusSection').classList.remove('hidden');
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                loadKamus();
            }
        }

        async function loadWords() {
            try {
                const res = await fetch('/api/admin-usulan', { 
                    headers: { 'x-admin-password': password } 
                });
                const result = await res.json();
                
                if(!result.success) return logout();
                
                const list = document.getElementById('wordsList');
                if(result.data.length === 0) {
                    list.innerHTML = `<div style="text-align: center; padding: 40px; color: var(--text-dim);">
                        <i class="fas fa-circle-check" style="font-size: 2rem; margin-bottom: 20px; color: var(--accent-green);"></i>
                        <p>Semua usulan sudah diproses.</p>
                    </div>`;
                    return;
                }

                const tableHTML = `
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Kata (ID)</th>
                                <th>Kata (Dusun)</th>
                                <th>Kontributor</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${result.data.map(item => `
                                <tr>
                                    <td><strong>${item.indonesia}</strong></td>
                                    <td><span style="color: var(--accent-green); font-weight: 700;">${item.dusun}</span></td>
                                    <td>${item.nama || 'Anonim'}</td>
                                    <td style="display: flex; gap: 8px;">
                                        <button class="btn-dash btn-dash-primary" onclick='approveWord(${JSON.stringify(item)})'>Approve</button>
                                        <button class="btn-dash btn-dash-delete" onclick="deleteWord(${item.id})">Hapus</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                list.innerHTML = tableHTML;
            } catch (err) { console.error(err); }
        }

        async function loadKamus() {
            try {
                const res = await fetch('/api/admin-usulan?type=kamus', { 
                    headers: { 'x-admin-password': password } 
                });
                const result = await res.json();
                if(!result.success) return;

                const container = document.getElementById('kamusTableContainer');
                const tableHTML = `
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Indonesia</th>
                                <th>Dusun</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${result.data.map(item => `
                                <tr>
                                    <td style="font-size: 0.7rem; color: var(--text-dim);">${item.id}</td>
                                    <td><strong>${item.indonesia}</strong></td>
                                    <td><span style="color: var(--accent-green); font-weight: 700;">${item.dusun}</span></td>
                                    <td>
                                        <div style="display: flex; gap: 8px;">
                                            <button class="btn-dash btn-dash-edit" onclick='openEditModal(${JSON.stringify(item)})' title="Edit Kosa Kata">
                                                <i class="fas fa-edit"></i>
                                            </button>
                                            <button class="btn-dash btn-dash-delete" onclick="deleteKamusItem(${item.id})" title="Hapus dari Kamus Utama">
                                                <i class="fas fa-trash-can"></i>
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                container.innerHTML = tableHTML;
            } catch (err) { console.error(err); }
        }

        // --- Edit Modal Logic ---
        function openEditModal(item) {
            currentEditItem = item;
            document.getElementById('edit-id').value = item.id;
            document.getElementById('edit-indo').value = item.indonesia;
            document.getElementById('edit-dusun').value = item.dusun;
            document.getElementById('edit-contoh-id').value = item.contoh_id || '';
            document.getElementById('edit-contoh-dusun').value = item.contoh_dusun || '';
            document.getElementById('current-audio').innerText = item.audio_url ? 'Sudah ada audio' : 'Belum ada audio';
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        async function saveEdit() {
            const id = document.getElementById('edit-id').value;
            const indonesia = document.getElementById('edit-indo').value;
            const dusun = document.getElementById('edit-dusun').value;
            const contoh_id = document.getElementById('edit-contoh-id').value;
            const contoh_dusun = document.getElementById('edit-contoh-dusun').value;
            const audioFile = document.getElementById('edit-audio').files[0];

            let audioUrl = currentEditItem.audio_url;

            // If there's a new audio file, upload it first
            if (audioFile) {
                const formData = new FormData();
                formData.append('audio', audioFile);
                
                try {
                    const uploadRes = await fetch('/api/admin-upload-audio', {
                        method: 'POST',
                        headers: { 'x-admin-password': password },
                        body: formData
                    });
                    const uploadData = await uploadRes.json();
                    if(uploadData.success) {
                        audioUrl = uploadData.audio_url;
                    } else {
                        return alert("Gagal upload audio: " + uploadData.message);
                    }
                } catch (e) {
                    return alert("Error upload audio.");
                }
            }

            // Save to DB
            const res = await fetch('/api/admin-usulan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-admin-password': password },
                body: JSON.stringify({ 
                    action: 'UPDATE_KAMUS_ITEM', 
                    payload: { id, indonesia, dusun, contoh_id, contoh_dusun, audio_url: audioUrl } 
                })
            });
            const data = await res.json();
            if(data.success) {
                alert("Berhasil update!");
                closeEditModal();
                loadKamus();
            } else {
                alert("Gagal: " + data.message);
            }
        }

        async function importJSON() {
            try {
                const jsonStr = document.getElementById('jsonInput').value;
                if(!jsonStr) return alert("Paste dulu JSON-nya mas.");
                const jsonData = JSON.parse(jsonStr);
                
                const res = await fetch('/api/admin-usulan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-admin-password': password },
                    body: JSON.stringify({ action: 'IMPORT_JSON', payload: { jsonData } })
                });
                const data = await res.json();
                if(data.success) {
                    alert(data.message);
                    document.getElementById('jsonInput').value = "";
                    loadKamus();
                } else {
                    alert(data.message);
                }
            } catch (err) {
                alert("Format JSON kayaknya salah: " + err.message);
            }
        }

        // Handle file upload
        document.getElementById('jsonFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('jsonInput').value = event.target.result;
            };
            reader.readAsText(file);
        });

        async function approveWord(item) {
            const res = await fetch('/api/admin-usulan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-admin-password': password },
                body: JSON.stringify({ action: 'APPROVE_USULAN', payload: item })
            });
            const data = await res.json();
            loadWords();
        }

        async function deleteWord(id) {
            if(!confirm('Hapus usulan ini?')) return;
            await fetch('/api/admin-usulan', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json', 'x-admin-password': password },
                body: JSON.stringify({ id })
            });
            loadWords();
        }

        async function deleteKamusItem(id) {
            if(!confirm('Yakin nak hapus kosa kata ini dari Kamus Utama?')) return;
            const res = await fetch('/api/admin-usulan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-admin-password': password },
                body: JSON.stringify({ action: 'DELETE_KAMUS_ITEM', payload: { id } })
            });
            const data = await res.json();
            if(data.success) loadKamus();
        }

        window.onload = loadWords;
    </script>
</body>
</html>
