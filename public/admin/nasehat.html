<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Nasehat | Admin Dusun PALI</title>
    <link rel="icon" type="image/png" href="/dusun-bot.png">
    <link rel="stylesheet" href="/admin/admin-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/admin/auth-check.js"></script>
</head>
<body>
    <aside class="sidebar">
        <div class="logo-area">
            <div class="stat-icon" style="margin-bottom: 0; padding:10px; width: 45px; height: 45px;">
                <i class="fas fa-robot"></i>
            </div>
            <h2><span>Dusun Bot</span></h2>
        </div>
        <nav class="nav-menu">
            <a href="/admin/index.html" class="nav-link"><i class="fas fa-gauge-high"></i> <span>Dashboard</span></a>
            <a href="/admin/words.html" class="nav-link"><i class="fas fa-language"></i> <span>Kosa Kata</span></a>
            <a href="/admin/folklore.html" class="nav-link"><i class="fas fa-scroll"></i> <span>Cerita Rakyat</span></a>
            <a href="/admin/nasehat.html" class="nav-link active"><i class="fas fa-comment-dots"></i> <span>Nasehat</span></a>
            <a href="/admin/knowledge.html" class="nav-link"><i class="fas fa-brain"></i> <span>Pengetahuan AI</span></a>
            <a href="/admin/ai-learned.html" class="nav-link"><i class="fas fa-graduation-cap"></i> <span>Hasil Belajar AI</span></a>
            <a href="/admin/settings.html" class="nav-link"><i class="fas fa-gear"></i> <span>Settings</span></a>
        </nav>
        <div class="sidebar-footer">
            <a href="/" class="nav-link"><i class="fas fa-house"></i> <span>Ke Website</span></a>
            <div class="nav-link" onclick="logout()" style="color: #ef4444;"><i class="fas fa-power-off"></i> <span>Logout</span></div>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="topbar">
            <div class="page-title"><h1>Nasehat Dusun PALI</h1></div>
            <div class="top-actions">
                <div class="user-profile">
                    <img id="user-avatar" src="https://ui-avatars.com/api/?name=Admin+PALI&background=10b981&color=fff" alt="Avatar">
                    <span id="user-fullname" style="font-weight: 700;">Admin PALI</span>
                </div>
            </div>
        </header>

        <main class="content-area">
            <div class="dashboard-card">
                <div class="card-header">
                    <h3 id="nasehat-form-title"><i class="fas fa-pen-to-square"></i> Tambah Nasehat Dusun</h3>
                </div>
                <div class="form-grid">
                    <div class="input-group full">
                        <label>Kalimat Nasehat</label>
                        <input type="text" id="nasehat-text" class="dash-input" placeholder="Contoh: Ayer Tenang, Terus Menghanyutkan">
                    </div>
                    <div class="input-group full">
                        <label>Arti / Makna</label>
                        <textarea id="nasehat-meaning" class="dash-input" style="height: 100px;" placeholder="Tuliskan makna nasehat tersebut..."></textarea>
                    </div>
                </div>
                <div style="display: flex; gap: 12px; margin-top: 20px;">
                    <button class="btn-dash btn-dash-primary" onclick="saveNasehat()">
                        <i class="fas fa-floppy-disk"></i> <span id="btn-text-nasehat">Simpan Nasehat</span>
                    </button>
                    <button class="btn-dash btn-dash-delete hidden" id="btn-cancel-nasehat" onclick="resetNasehatForm()">
                        <i class="fas fa-xmark"></i> Batal
                    </button>
                </div>
            </div>

            <div class="dashboard-card">
                <div class="card-header">
                    <h3><i class="fas fa-list-ul"></i> Daftar Nasehat Aktif</h3>
                </div>
                <div id="nasehatList" class="loading-state">Memuat data...</div>
            </div>
        </main>
    </div>

    <script>
        const token = localStorage.getItem('admin_token');
        const user = JSON.parse(localStorage.getItem('admin_user') || '{}');

        if (user.full_name) {
            document.getElementById('user-fullname').innerText = user.full_name;
            document.getElementById('user-avatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(user.full_name)}&background=10b981&color=fff`;
        }
        let editingNasehatId = null;

        async function loadNasehat() {
            try {
                const res = await fetch('/api/nasehat');
                const result = await res.json();
                const list = document.getElementById('nasehatList');
                
                const data = result.data || [];
                if(data.length === 0) {
                    list.innerHTML = "<p style='color: var(--text-dim);'>Belum ada nasehat tersimpan.</p>";
                    return;
                }

                list.innerHTML = `
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Nasehat</th>
                                <th>Makna</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.map((item, index) => `
                                <tr>
                                    <td>${index + 1}</td>
                                    <td><strong>${item.text}</strong></td>
                                    <td>${item.meaning}</td>
                                    <td style="display: flex; gap: 8px;">
                                        <button class="btn-dash btn-dash-edit" onclick='editNasehat(${JSON.stringify(item).replace(/'/g, "\\'")})'>
                                            <i class="fas fa-pen"></i> Edit
                                        </button>
                                        <button class="btn-dash btn-dash-delete" onclick="deleteNasehat(${item.id})">
                                            <i class="fas fa-trash-can"></i> Hapus
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (err) { console.error(err); }
        }

        function editNasehat(item) {
            editingNasehatId = item.id;
            document.getElementById('nasehat-form-title').innerHTML = `<i class="fas fa-pen-to-square"></i> Mengubah Nasehat`;
            document.getElementById('nasehat-text').value = item.text;
            document.getElementById('nasehat-meaning').value = item.meaning;

            document.getElementById('btn-text-nasehat').innerText = "Update Nasehat";
            document.getElementById('btn-cancel-nasehat').classList.remove('hidden');
            document.getElementById('nasehat-form-title').scrollIntoView({ behavior: 'smooth' });
        }

        function resetNasehatForm() {
            editingNasehatId = null;
            document.getElementById('nasehat-form-title').innerHTML = `<i class="fas fa-pen-to-square"></i> Tambah Nasehat Dusun`;
            document.getElementById('nasehat-text').value = "";
            document.getElementById('nasehat-meaning').value = "";
            
            document.getElementById('btn-text-nasehat').innerText = "Simpan Nasehat";
            document.getElementById('btn-cancel-nasehat').classList.add('hidden');
        }

        async function saveNasehat() {
            const payload = {
                text: document.getElementById('nasehat-text').value,
                meaning: document.getElementById('nasehat-meaning').value
            };

            if(!payload.text || !payload.meaning) return alert("Kalimat dan Arti wajib diisi.");

            const method = editingNasehatId ? 'PUT' : 'POST';
            if (editingNasehatId) payload.id = editingNasehatId;

            const res = await fetch('/api/nasehat', {
                method: method,
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if(data.success) {
                alert("Berhasil!");
                resetNasehatForm();
                loadNasehat();
            } else {
                alert(data.message || "Gagal menyimpan.");
            }
        }

        async function deleteNasehat(id) {
            if(!confirm('Yakin ingin hapus nasehat ini?')) return;
            await fetch('/api/nasehat', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ id })
            });
            loadNasehat();
        }

        window.onload = loadNasehat;
    </script>
</body>
</html>
