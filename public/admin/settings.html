<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | Admin Dusun PALI</title>
    <link rel="stylesheet" href="/admin/admin-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/admin/auth-check.js"></script>
</head>
<body>
    <aside class="sidebar">
        <div class="logo-area">
            <div class="stat-icon" style="margin-bottom: 0; padding:10px; width: 45px; height: 45px;">
                <i class="fas fa-robot"></i>
            </div>
            <h2><span>Dusun Bot</span></h2>
        </div>
        <nav class="nav-menu">
            <a href="/admin/index.html" class="nav-link"><i class="fas fa-gauge-high"></i> <span>Dashboard</span></a>
            <a href="/admin/words.html" class="nav-link"><i class="fas fa-language"></i> <span>Kosa Kata</span></a>
            <a href="/admin/folklore.html" class="nav-link"><i class="fas fa-scroll"></i> <span>Cerita Rakyat</span></a>
            <a href="/admin/settings.html" class="nav-link active"><i class="fas fa-gear"></i> <span>Settings</span></a>
        </nav>
        <div class="sidebar-footer">
            <a href="/" class="nav-link"><i class="fas fa-house"></i> <span>Ke Website</span></a>
            <div class="nav-link" onclick="logout()" style="color: #ef4444;"><i class="fas fa-power-off"></i> <span>Logout</span></div>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="topbar">
            <div class="page-title"><h1>Pengaturan Sistem</h1></div>
            <div class="top-actions">
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=Admin+PALI&background=10b981&color=fff" alt="Avatar">
                    <span style="font-weight: 700;">Admin PALI</span>
                </div>
            </div>
        </header>

        <main class="content-area">
            <div class="dashboard-card" style="max-width: 600px;">
                <div class="card-header">
                    <h3><i class="fas fa-database"></i> Database & Backend Source</h3>
                </div>
                <p style="color: var(--text-dim); margin-bottom: 25px;">Pilih sumber data utama untuk kamus digital.</p>
                <div style="display: flex; gap: 15px;">
                    <button class="btn-dash" id="btn-source-json" onclick="setSource('json')">
                        <i class="fas fa-file-code"></i> Local JSON
                    </button>
                    <button class="btn-dash" id="btn-source-supabase" onclick="setSource('supabase')">
                        <i class="fas fa-cloud"></i> Cloud Supabase
                    </button>
                </div>
                <div id="source-status" style="margin-top: 20px; font-weight: 600; font-size: 0.9rem;"></div>
            </div>
        </main>
    </div>

    <script>
        const password = localStorage.getItem('admin_password');

        async function loadSettings() {
            try {
                const res = await fetch('/api/admin-usulan?type=settings', { headers: { 'x-admin-password': password } });
                const data = await res.json();
                if(!data.success) return logout();
                
                updateSourceButtons(data.source);
            } catch (err) { console.error(err); }
        }

        function updateSourceButtons(source) {
            const jsonBtn = document.getElementById('btn-source-json');
            const sbBtn = document.getElementById('btn-source-supabase');
            const status = document.getElementById('source-status');
            
            jsonBtn.className = source === 'json' ? "btn-dash btn-dash-primary" : "btn-dash btn-dash-edit";
            sbBtn.className = source === 'supabase' ? "btn-dash btn-dash-primary" : "btn-dash btn-dash-edit";
            status.innerText = `Aktif saat ini: ${source.toUpperCase()}`;
            status.style.color = "var(--accent-green)";
        }

        async function setSource(val) {
            const res = await fetch('/api/admin-usulan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-admin-password': password },
                body: JSON.stringify({ action: 'UPDATE_SETTING', key: 'data_source', value: val })
            });
            const data = await res.json();
            if(data.success) {
                updateSourceButtons(val);
                alert("Pengaturan diperbarui.");
            }
        }

        window.onload = loadSettings;
    </script>
</body>
</html>
