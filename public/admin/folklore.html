<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Cerita Rakyat | Admin Dusun PALI</title>
    <link rel="stylesheet" href="/admin/admin-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/admin/auth-check.js"></script>
</head>
<body>
    <aside class="sidebar">
        <div class="logo-area">
            <div class="stat-icon" style="margin-bottom: 0; padding:10px; width: 45px; height: 45px;">
                <i class="fas fa-robot"></i>
            </div>
            <h2><span>Dusun Bot</span></h2>
        </div>
        <nav class="nav-menu">
            <a href="/admin/index.html" class="nav-link"><i class="fas fa-gauge-high"></i> <span>Dashboard</span></a>
            <a href="/admin/words.html" class="nav-link"><i class="fas fa-language"></i> <span>Kosa Kata</span></a>
            <a href="/admin/folklore.html" class="nav-link active"><i class="fas fa-scroll"></i> <span>Cerita Rakyat</span></a>
            <a href="/admin/nasehat.html" class="nav-link"><i class="fas fa-comment-dots"></i> <span>Nasehat</span></a>
            <a href="/admin/settings.html" class="nav-link"><i class="fas fa-gear"></i> <span>Settings</span></a>
        </nav>
        <div class="sidebar-footer">
            <a href="/" class="nav-link"><i class="fas fa-house"></i> <span>Ke Website</span></a>
            <div class="nav-link" onclick="logout()" style="color: #ef4444;"><i class="fas fa-power-off"></i> <span>Logout</span></div>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="topbar">
            <div class="page-title"><h1>Pustaka Cerita Rakyat</h1></div>
            <div class="top-actions">
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=Admin+PALI&background=10b981&color=fff" alt="Avatar">
                    <span style="font-weight: 700;">Admin PALI</span>
                </div>
            </div>
        </header>

        <main class="content-area">
            <div class="dashboard-card">
                <div class="card-header">
                    <h3 id="folklore-form-title"><i class="fas fa-pen-to-square"></i> Kelola Pustaka Rakyat</h3>
                </div>
                <div class="form-grid">
                    <div class="input-group">
                        <label>Judul Cerita</label>
                        <input type="text" id="folklore-title" class="dash-input" placeholder="Contoh: Legenda Candi Bumi Ayu" oninput="generateSlug()">
                    </div>
                    <div class="input-group">
                        <label>Slug URL (Otomatis)</label>
                        <input type="text" id="folklore-slug" class="dash-input" placeholder="legenda-candi-bumi-ayu">
                    </div>
                    <div class="input-group">
                        <label>Foto Sampul Cerita (Upload/URL)</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="text" id="folklore-image" class="dash-input" placeholder="https://example.com/foto.jpg" style="flex: 1;">
                            <label class="btn-dash btn-dash-edit" style="cursor: pointer; margin-bottom: 0; padding: 12px 18px;">
                                <i class="fas fa-upload"></i> <input type="file" id="file-upload" hidden accept="image/*">
                            </label>
                        </div>
                        <div id="image-preview-container" class="hidden" style="margin-top: 15px;">
                            <img id="image-preview" src="" style="width: 100%; max-height: 200px; object-fit: cover; border-radius: 12px; border: 1px solid var(--glass-border);">
                            <p style="font-size: 0.75rem; color: var(--accent-green); margin-top: 5px;">Gambar siap disimpan!</p>
                        </div>
                    </div>
                    <div class="input-group full">
                        <label>Ringkasan Pendek (Excerpt)</label>
                        <textarea id="folklore-excerpt" class="dash-input" style="height: 100px;" placeholder="Tulis ringkasan singkat untuk tampilan kartu..."></textarea>
                    </div>
                    <div class="input-group full">
                        <label>Isi Cerita Lengkap</label>
                        <textarea id="folklore-content" class="dash-input" style="height: 300px;" placeholder="Tuliskan seluruh isi cerita di sini..."></textarea>
                    </div>
                </div>
                <div style="display: flex; gap: 12px; margin-top: 20px;">
                    <button class="btn-dash btn-dash-primary" onclick="saveFolklore()">
                        <i class="fas fa-floppy-disk"></i> <span id="btn-text-folklore">Simpan Cerita</span>
                    </button>
                    <button class="btn-dash btn-dash-delete hidden" id="btn-cancel-folklore" onclick="resetFolkloreForm()">
                        <i class="fas fa-xmark"></i> Batal
                    </button>
                </div>
            </div>

            <div class="dashboard-card">
                <div class="card-header">
                    <h3><i class="fas fa-list-ul"></i> Katalog Cerita Aktif</h3>
                </div>
                <div id="folkloreList" class="loading-state">Memuat katalog...</div>
            </div>
        </main>
    </div>

    <script>
        const password = localStorage.getItem('admin_password');
        let editingFolkloreId = null;

        async function loadFolklore() {
            try {
                const res = await fetch('/api/cerita-rakyat');
                const result = await res.json();
                const list = document.getElementById('folkloreList');
                
                const stories = result.data || [];
                if(stories.length === 0) {
                    list.innerHTML = "<p style='color: var(--text-dim);'>Katalog masih kosong.</p>";
                    return;
                }

                list.innerHTML = `
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Cover</th>
                                <th>Judul Cerita</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${stories.map(item => `
                                <tr>
                                    <td style="width: 80px;"><img src="${item.image_url || '/gallery/heritage.png'}" style="width: 60px; height: 40px; border-radius: 8px; object-fit: cover;"></td>
                                    <td><strong>${item.title}</strong></td>
                                    <td style="display: flex; gap: 8px;">
                                        <button class="btn-dash btn-dash-edit" onclick='editFolklore(${JSON.stringify(item).replace(/'/g, "\\'")})'>
                                            <i class="fas fa-pen"></i> Edit
                                        </button>
                                        <button class="btn-dash btn-dash-delete" onclick="deleteFolklore(${item.id})">
                                            <i class="fas fa-trash-can"></i> Hapus
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (err) { console.error(err); }
        }

        function editFolklore(item) {
            editingFolkloreId = item.id;
            document.getElementById('folklore-form-title').innerHTML = `<i class="fas fa-pen-to-square"></i> Mengubah: ${item.title}`;
            document.getElementById('folklore-title').value = item.title;
            document.getElementById('folklore-slug').value = item.slug || "";
            document.getElementById('folklore-excerpt').value = item.excerpt || "";
            document.getElementById('folklore-content').value = item.content;
            document.getElementById('folklore-image').value = item.image_url || "";
            
            if (item.image_url) {
                document.getElementById('image-preview').src = item.image_url;
                document.getElementById('image-preview-container').classList.remove('hidden');
            }

            document.getElementById('btn-text-folklore').innerText = "Update Cerita";
            document.getElementById('btn-cancel-folklore').classList.remove('hidden');
            document.getElementById('folklore-form-title').scrollIntoView({ behavior: 'smooth' });
        }

        function resetFolkloreForm() {
            editingFolkloreId = null;
            document.getElementById('folklore-form-title').innerHTML = `<i class="fas fa-pen-to-square"></i> Kelola Pustaka Rakyat`;
            document.getElementById('folklore-title').value = "";
            document.getElementById('folklore-slug').value = "";
            document.getElementById('folklore-excerpt').value = "";
            document.getElementById('folklore-content').value = "";
            document.getElementById('folklore-image').value = "";
            document.getElementById('image-preview-container').classList.add('hidden');
            
            document.getElementById('btn-text-folklore').innerText = "Simpan Cerita";
            document.getElementById('btn-cancel-folklore').classList.add('hidden');
        }

        function generateSlug() {
            if (editingFolkloreId) return; // Don't auto-generate when editing
            const title = document.getElementById('folklore-title').value;
            const slug = title.toLowerCase()
                .replace(/[^\w ]+/g, '')
                .replace(/ +/g, '-');
            document.getElementById('folklore-slug').value = slug;
        }

        // Handle file upload to Base64
        document.getElementById('file-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            if (file.size > 500 * 1024) { // 500kb limit
                alert("Waduh, fotonya kegedean. Gak boleh lebih dari 500KB ya.");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(event) {
                const base64 = event.target.result;
                document.getElementById('folklore-image').value = base64;
                document.getElementById('image-preview').src = base64;
                document.getElementById('image-preview-container').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        });

        // Sync preview when manual URL entered
        document.getElementById('folklore-image').addEventListener('input', function(e) {
            const url = e.target.value;
            if (url && url.startsWith('http')) {
                document.getElementById('image-preview').src = url;
                document.getElementById('image-preview-container').classList.remove('hidden');
            } else {
                document.getElementById('image-preview-container').classList.add('hidden');
            }
        });

        async function saveFolklore() {
            const payload = {
                title: document.getElementById('folklore-title').value,
                slug: document.getElementById('folklore-slug').value,
                excerpt: document.getElementById('folklore-excerpt').value,
                content: document.getElementById('folklore-content').value,
                image_url: document.getElementById('folklore-image').value
            };

            if(!payload.title || !payload.content) return alert("Judul sama Isi jangan dikosongin ya.");

            const method = editingFolkloreId ? 'PUT' : 'POST';
            if (editingFolkloreId) payload.id = editingFolkloreId;

            const res = await fetch('/api/cerita-rakyat', {
                method: method,
                headers: { 'Content-Type': 'application/json', 'x-admin-password': password },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if(data.success) {
                alert("Berhasil!");
                resetFolkloreForm();
                loadFolklore();
            } else {
                alert(data.message || "Gagal menyimpan.");
            }
        }

        async function deleteFolklore(id) {
            if(!confirm('Yakin nak hapus cerita ini?')) return;
            await fetch('/api/cerita-rakyat', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json', 'x-admin-password': password },
                body: JSON.stringify({ id })
            });
            loadFolklore();
        }

        window.onload = loadFolklore;
    </script>
</body>
</html>
