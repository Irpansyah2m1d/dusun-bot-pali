<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pustaka Digital PALI | Cerita Rakyat & Sejarah</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/dusun-bot.png">
    <style>
        .pustaka-page { padding: 80px 5% 60px; max-width: 1200px; margin: 0 auto; }
        .pustaka-header { text-align: center; margin-bottom: 50px; }
    </style>
</head>
<body>
    <div class="glow-orb" id="orb1"></div>
    <header>
        <nav>
            <div class="logo-area" onclick="window.location.href='/'">
                <img src="/dusun-bot.png" alt="Logo" class="nav-logo">
                <span>Dusun Bot <span class="accent">PALI</span></span>
            </div>
            <div class="nav-links" id="nav-links">
                <a href="/">Beranda</a>
                <a href="/sejarah.html">Sejarah</a>
                <a href="/pustaka.html" class="active">Cerita Rakyat</a>
                <a href="/kamus.html">Kamus</a>
                <a href="/#docs">API</a>
                <a href="https://github.com/Irpansyah2m1d/dusun-bot-pali" target="_blank" class="btn-github">GitHub</a>
            </div>
            <div class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </nav>
    </header>

    <main class="pustaka-page">
        <div class="pustaka-header">
            <h1>Pustaka Digital <span class="accent">PALI</span></h1>
            <p>Kumpulan Cerita Rakyat, Legenda, dan Sejarah Bumi Serepat Serasan.</p>
        </div>

        <div class="folklore-filters" style="margin-bottom: 50px;">
            <button class="filter-chip active" onclick="filterFolklore('Semua', this)">Semua</button>
            <button class="filter-chip" onclick="filterFolklore('Mistis', this)">Mistis</button>
            <button class="filter-chip" onclick="filterFolklore('Cinta Lama', this)">Cinta Lama</button>
            <button class="filter-chip" onclick="filterFolklore('Zaman Dulu', this)">Zaman Dulu</button>
            <button class="filter-chip" onclick="filterFolklore('Sejarah', this)">Sejarah</button>
            <button class="filter-chip" onclick="filterFolklore('Cerita Lucu', this)">Cerita Lucu</button>
        </div>

        <div class="folklore-grid" id="pustaka-grid">
            <!-- Data -->
        </div>
    </main>

    <script>
        let allStories = [];
        async function loadPustaka() {
            const grid = document.getElementById('pustaka-grid');
            if(grid) {
                grid.innerHTML = Array(6).fill(`
                    <article class="skeleton-card skeleton">
                        <div class="skeleton-img"></div>
                        <div class="folklore-card-body" style="padding: 20px;">
                            <div class="skeleton-text title skeleton"></div>
                            <div class="skeleton-text skeleton" style="width: 50%;"></div>
                            <div class="skeleton-text skeleton" style="margin-top: 15px; width: 90%;"></div>
                            <div class="skeleton-text skeleton" style="width: 70%;"></div>
                        </div>
                    </article>
                `).join('');
            }
            try {
                const res = await fetch('/api/cerita-rakyat');
                const result = await res.json();
                allStories = result.data || [];
                renderPustaka('Semua');
            } catch (err) { console.error(err); }
        }

        function renderPustaka(categoryFilter) {
            const grid = document.getElementById('pustaka-grid');
            let filtered = allStories;
            if (categoryFilter !== 'Semua') {
                filtered = allStories.filter(s => s.category === categoryFilter);
            }

            if (filtered.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.5);"><div style="font-size: 3rem; margin-bottom: 15px;">📭</div><p style="font-size: 1.1rem;">Belum ada cerita untuk kategori ini.</p></div>';
                return;
            }

            grid.innerHTML = filtered.map(item => `
                <article class="folklore-card" onclick="location.href='/cerita.html?slug=${item.slug || item.id}'" style="position:relative;">
                    <div class="category-badge">${item.category || 'Sejarah'}</div>
                    <img src="${item.image_url || '/gallery/heritage.png'}" class="folklore-img" alt="${item.title}">
                    <div class="folklore-card-body">
                        <h3 style="font-size: 1.1rem; margin-bottom: 5px;">${item.title}</h3>
                        <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 8px;">
                            ${item.penulis ? `<span style="font-size: 0.75rem; color: #10b981;"><i class="fas fa-pen-nib" style="margin-right: 4px;"></i>${item.penulis}</span>` : ''}
                            ${item.asal ? `<span style="font-size: 0.7rem; color: var(--text-dim); font-style: italic;"><i class="fas fa-map-marker-alt" style="margin-right: 4px;"></i>${item.asal}</span>` : ''}
                        </div>
                        <p style="font-size: 0.85rem; margin-top: 5px;">${item.excerpt ? item.excerpt.split('.')[0] + '...' : 'Klik untuk membaca...'}</p>
                        <span class="read-more" style="font-size: 0.8rem; margin-top: 10px; display: inline-block;">Baca ➔</span>
                    </div>
                </article>
            `).join('');
        }

        function filterFolklore(category, btn) {
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            renderPustaka(category);
        }

        window.onload = loadPustaka;

        const mobileMenu = document.getElementById('mobile-menu');
        const navLinks = document.getElementById('nav-links');
        mobileMenu.addEventListener('click', () => {
            mobileMenu.classList.toggle('active');
            navLinks.classList.toggle('active');
        });
    </script>
</body>
</html>
