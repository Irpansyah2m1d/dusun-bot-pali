<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerita Rakyat PALI - Dusun Bot PALI</title>
    <link rel="icon" type="image/png" href="/dusun-bot.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <meta property="og:title" content="Cerita Rakyat PALI - Dusun Bot PALI" id="og-title">
    <meta property="og:description" content="Baca cerita rakyat dan sejarah dari Kabupaten PALI." id="og-desc">
    <meta property="og:image" content="/gallery/heritage.png" id="og-image">
    <meta property="og:url" content="" id="og-url">
    <meta property="og:type" content="article">
    <meta name="twitter:card" content="summary_large_image">
    
    <style>
        .story-page { padding-top: 120px; padding-bottom: 100px; }
        .story-container { max-width: 900px; margin: 0 auto; padding: 0 20px; }
        .story-header { text-align: center; margin-bottom: 50px; }
        .story-cover { width: 100%; height: auto; display: block; border-radius: 24px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .story-title { font-size: 3rem; margin-bottom: 15px; color: white; line-height: 1.2; font-weight: 800; }
        .story-meta { color: #10b981; font-weight: 600; margin-bottom: 20px; display: block; text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem; }
        .story-content { line-height: 1.9; color: rgba(255,255,255,0.9); font-size: 1.15rem; }
        .story-content p { margin-bottom: 25px; }
        .story-content h2, .story-content h3 { color: white; margin-top: 40px; margin-bottom: 20px; font-weight: 700; }
        
        .loading-state { color: rgba(255,255,255,0.5); font-style: italic; }

        @media (max-width: 768px) {
            .story-title { font-size: 2rem; }
            .story-page { padding-top: 100px; }
        }
    </style>
</head>
<body>
    <div class="glow-orb" id="orb1"></div>
    <div class="glow-orb" id="orb2"></div>

    <header>
        <nav>
            <div class="logo-area" onclick="window.location.href='/'">
                <img src="/dusun-bot.png" alt="Dusun Bot Logo" class="nav-logo">
                <span>Dusun Bot <span class="accent">PALI</span></span>
            </div>
            <div class="nav-links" id="nav-links">
                <a href="/">Beranda</a>
                <a href="/sejarah.html">Sejarah</a>
                <a href="/pustaka.html" class="active">Cerita Rakyat</a>
                <a href="/kamus.html">Kamus</a>
                <a href="/#docs">API</a>
                <a href="https://github.com/Irpansyah2m1d/dusun-bot-pali" target="_blank" class="btn-github">GitHub</a>
            </div>
            <div class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </nav>
    </header>

    <main class="story-page fade-in">
        <div class="story-container" id="story-content-area">
            <div class="loading-state" style="text-align: center; padding: 100px;">
                <div style="font-size: 3rem; margin-bottom: 20px;">📖</div>
                Memuat cerita...
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');
            const container = document.getElementById('story-content-area');

            if (!slug) {
                container.innerHTML = "<div style='text-align:center;'><h2>Cerita tidak ditemukan.</h2><p><a href='/' style='color:#10b981;'>Kembali ke Beranda</a></p></div>";
                return;
            }

            try {
                const res = await fetch(`/api/cerita-rakyat?slug=${slug}`);
                const result = await res.json();

                if (result.success && result.data) {
                    const story = result.data;
                    document.title = `${story.title} - Cerita Rakyat PALI`;
                    
                    // Render content with HTML support
                    container.innerHTML = `
                        <div class="story-header">
                            <span class="story-meta">Koleksi Pustaka Rakyat PALI</span>
                            <h1 class="story-title">${story.title}</h1>
                            <div style="height: 4px; width: 60px; background: #10b981; margin: 0 auto; border-radius: 2px;"></div>
                        </div>
                        <img src="${story.image_url || '/gallery/heritage.png'}" class="story-cover" alt="${story.title}">
                        <div class="story-content">
                            ${story.content}
                        </div>
                        
                        <div style="margin-top: 50px; padding: 25px; background: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 16px; display: flex; flex-direction: column; gap: 10px;">
                            <h3 style="margin-top:0; color: #10b981; font-weight: 700; font-size: 1.2rem;">Informasi Cerita</h3>
                            ${story.penulis ? `<div style="color: rgba(255,255,255,0.8);"><strong>Narator / Penulis:</strong> ${story.penulis} ${story.instagram ? `<a href="https://instagram.com/${story.instagram}" target="_blank" style="color: #10b981; text-decoration: none; margin-left: 5px;"><i class="fab fa-instagram"></i> @${story.instagram}</a>` : ''}</div>` : ''}
                            ${story.asal ? `<div style="color: rgba(255,255,255,0.8);"><strong>Asal Cerita:</strong> ${story.asal}</div>` : ''}
                        </div>

                        <div style="margin-top: 50px; padding: 30px; background: linear-gradient(135deg, rgba(16, 185, 129, 0.08), rgba(6, 78, 59, 0.15)); border: 1px solid rgba(16, 185, 129, 0.25); border-radius: 20px; text-align: center;">
                            <div style="font-size: 2.5rem; margin-bottom: 12px;">📝</div>
                            <h3 style="color: white; font-size: 1.3rem; margin-bottom: 10px; font-weight: 700;">Punya Cerita Tentang PALI?</h3>
                            <p style="color: rgba(255,255,255,0.7); font-size: 0.95rem; margin-bottom: 20px; max-width: 500px; margin-left: auto; margin-right: auto;">Kamu punya cerita tentang PALI? Bisa berupa sejarah, cerita mistis, lucu, percintaan, atau kisah orang tua zaman dulu? Yuk, bagikan ceritamu!</p>
                            <a href="https://wa.me/6282281488763?text=Halo%20Admin%2C%20saya%20mau%20kirimkan%20cerita%20rakyat%20tentang%20PALI" target="_blank" style="display: inline-flex; align-items: center; gap: 8px; background: #25D366; color: white; padding: 12px 28px; border-radius: 12px; text-decoration: none; font-weight: 700; font-size: 0.95rem; transition: 0.3s; box-shadow: 0 8px 25px rgba(37, 211, 102, 0.3);"><i class="fab fa-whatsapp" style="font-size: 1.2rem;"></i> Hubungi Admin via WhatsApp</a>
                        </div>

                        <div style="margin-top: 80px; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 40px;">
                            <p style="opacity: 0.6; margin-bottom: 20px;">Bagikan warisan budaya ini agar tidak lekang oleh waktu.</p>
                            
                            <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 40px;">
                                <a href="https://api.whatsapp.com/send?text=${encodeURIComponent(story.title + ' - Baca selengkapnya di: ' + window.location.href)}" target="_blank" class="btn-secondary" style="border-color: #25D366; color: #25D366; padding: 10px 20px; border-radius: 10px;"><i class="fab fa-whatsapp"></i> WhatsApp</a>
                                <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}" target="_blank" class="btn-secondary" style="border-color: #1877F2; color: #1877F2; padding: 10px 20px; border-radius: 10px;"><i class="fab fa-facebook-f"></i> Facebook</a>
                                <a href="https://twitter.com/intent/tweet?text=${encodeURIComponent(story.title)}&url=${encodeURIComponent(window.location.href)}" target="_blank" class="btn-secondary" style="border-color: #1DA1F2; color: #1DA1F2; padding: 10px 20px; border-radius: 10px;"><i class="fab fa-twitter"></i> Twitter</a>
                                <button onclick="copyLink()" class="btn-secondary" style="border-color: var(--glass-border); color: white; padding: 10px 20px; border-radius: 10px;"><i class="fas fa-link"></i> Salin Link</button>
                            </div>

                            <a href="/" class="btn-secondary" style="border-color: #10b981; color: #10b981; text-decoration: none; padding: 12px 25px; border-radius: 12px; border: 1px solid #10b981;">&larr; Kembali ke Beranda</a>
                        </div>
                    `;

                    // Handle Meta Tags
                    const imgUrl = story.image_url || (window.location.origin + '/gallery/heritage.png');
                    document.getElementById('og-title').setAttribute('content', story.title);
                    document.getElementById('og-desc').setAttribute('content', story.excerpt || 'Kumpulan Cerita Rakyat Bumi Serepat Serasan.');
                    document.getElementById('og-image').setAttribute('content', imgUrl);
                    document.getElementById('og-url').setAttribute('content', window.location.href);

                } else {
                    container.innerHTML = "<div style='text-align:center;'><h2>Maaf, cerita tidak ditemukan.</h2><p><a href='/' style='color:#10b981;'>Kembali ke Beranda</a></p></div>";
                }
            } catch (err) {
                container.innerHTML = "<div style='text-align:center;'><h2>Terjadi kesalahan saat memuat cerita.</h2></div>";
            }
        });

        const mobileMenu = document.getElementById('mobile-menu');
        const navLinks = document.getElementById('nav-links');
        mobileMenu.addEventListener('click', () => {
            mobileMenu.classList.toggle('active');
            navLinks.classList.toggle('active');
        });

        function copyLink() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                alert("Link cerita berhasil disalin!");
            }).catch(err => {
                console.error("Gagal menyalin link: ", err);
            });
        }
    </script>
</body>
</html>
