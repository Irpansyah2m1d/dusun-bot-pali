<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | Dusun Bot PALI</title>
    <link rel="stylesheet" href="/admin/admin-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-box">
        <div class="stat-icon" style="margin: 0 auto 30px; width: 80px; height: 80px; font-size: 2rem;">
            <i class="fas fa-shield-halved"></i>
        </div>
        <h2 style="margin-bottom: 10px; font-size: 1.8rem;">Dusun Admin</h2>
        <p style="color: var(--text-dim); margin-bottom: 40px;">Masukkan password untuk melanjutkan.</p>
        
        <div class="input-group">
            <input type="password" id="adminPass" class="dash-input" placeholder="Password Admin" style="text-align: center;">
        </div>
        
        <button class="btn-dash btn-dash-primary" onclick="login()" style="width: 100%; justify-content: center; padding: 18px;">
            <i class="fas fa-right-to-bracket"></i> Masuk ke Dashboard
        </button>
        
        <p style="margin-top: 30px; font-size: 0.9rem;">
            <a href="/" style="color: var(--text-dim); text-decoration: none;">&larr; Kembali ke Website</a>
        </p>
    </div>

    <script>
        // Check if already logged in
        if (localStorage.getItem('admin_password')) {
            window.location.href = '/admin/index.html';
        }

        async function login() {
            const pass = document.getElementById('adminPass').value;
            if(!pass) return alert("Silakan masukan password.");

            // Verify password via API
            try {
                const res = await fetch('/api/admin-usulan', { 
                    headers: { 'x-admin-password': pass } 
                });
                const result = await res.json();
                
                if(result.success) {
                    localStorage.setItem('admin_password', pass);
                    window.location.href = '/admin/index.html';
                } else {
                    alert(result.message || "Password salah!");
                }
            } catch (err) {
                alert("Terjadi kesalahan koneksi.");
            }
        }
    </script>
</body>
</html>
