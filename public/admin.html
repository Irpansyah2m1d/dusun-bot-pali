<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | Dusun Bot PALI</title>
    <link rel="stylesheet" href="/admin/admin-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-box">
        <div class="stat-icon" style="margin: 0 auto 30px; width: 80px; height: 80px; font-size: 2rem;">
            <i class="fas fa-shield-halved"></i>
        </div>
        <h2 style="margin-bottom: 10px; font-size: 1.8rem;">Dusun Admin</h2>
        <p style="color: var(--text-dim); margin-bottom: 40px;">Masukkan password untuk melanjutkan.</p>
        
        <div class="input-group" style="margin-bottom: 15px;">
            <input type="text" id="adminUser" class="dash-input" placeholder="Username Admin" style="text-align: center; width: 100%;">
        </div>
        
        <div class="input-group" style="position: relative;">
            <input type="password" id="adminPass" class="dash-input" placeholder="Password Admin" style="text-align: center; width: 100%;">
            <button type="button" onclick="togglePassword()" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 5px;">
                <i id="toggleIcon" class="fas fa-eye"></i>
            </button>
        </div>
        
        <button class="btn-dash btn-dash-primary" onclick="login()" style="width: 100%; justify-content: center; padding: 18px;">
            <i class="fas fa-right-to-bracket"></i> Masuk ke Dashboard
        </button>
        
        <p style="margin-top: 30px; font-size: 0.9rem;">
            <a href="/" style="color: var(--text-dim); text-decoration: none;">&larr; Kembali ke Website</a>
        </p>
    </div>

    <script>
        // Check if already logged in via token
        if (localStorage.getItem('admin_token')) {
            window.location.href = '/admin/index.html';
        }

        function togglePassword() {
            const passInput = document.getElementById('adminPass');
            const toggleIcon = document.getElementById('toggleIcon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        async function login() {
            const username = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            
            if(!username || !pass) return alert("Silakan masukan username dan password.");

            const btn = document.querySelector('.btn-dash-primary');
            const originalHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';

            try {
                const res = await fetch('/api/auth', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password: pass })
                });
                const result = await res.json();
                
                if(result.success) {
                    localStorage.setItem('admin_token', result.token);
                    localStorage.setItem('admin_user', JSON.stringify(result.user));
                    window.location.href = '/admin/index.html';
                } else {
                    alert(result.message || "Login gagal!");
                }
            } catch (err) {
                alert("Terjadi kesalahan koneksi.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalHTML;
            }
        }
    </script>
</body>
</html>
