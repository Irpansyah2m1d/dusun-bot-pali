<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Usulan Kosakata Dusun Bot</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { padding: 40px 5%; background: var(--deep-blue); min-height: 100vh; }
        .admin-container { max-width: 1000px; margin: 0 auto; }
        .admin-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; }
        .admin-header h1 { font-size: 2.5rem; margin-bottom: 8px; }
        
        .login-box {
            background: var(--slate-gray); padding: 40px; border-radius: 20px;
            max-width: 400px; margin: 100px auto; text-align: center;
            border: 1px solid var(--border-glass);
            position: relative;
        }
        .table-responsive { width: 100%; overflow-x: auto; background: var(--slate-gray); border-radius: 16px; border: 1px solid var(--border-glass); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 16px; border-bottom: 1px solid var(--border-glass); color: white; }
        th { background: rgba(0,0,0,0.3); font-weight: 700; color: var(--emerald-green); text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: rgba(255,255,255,0.02); }
        
        .btn-sm { padding: 8px 12px; font-size: 0.8rem; border-radius: 8px; cursor: pointer; border: none; font-weight: 600; font-family: inherit; }
        .btn-danger { background: rgba(255, 95, 86, 0.1); color: #ff5f56; border: 1px solid rgba(255, 95, 86, 0.3); }
        .btn-danger:hover { background: #ff5f56; color: white; }
        
        .btn-copy { background: rgba(16, 185, 129, 0.1); color: var(--emerald-green); border: 1px solid rgba(16, 185, 129, 0.3); }
        .btn-copy:hover { background: var(--emerald-green); color: white; }

        .btn-approve { background: rgba(39, 201, 63, 0.1); color: #27c93f; border: 1px solid rgba(39, 201, 63, 0.3); }
        .btn-approve:hover { background: #27c93f; color: white; }

        .btn-edit { background: rgba(255, 184, 0, 0.1); color: #ffb800; border: 1px solid rgba(255, 184, 0, 0.3); }
        .btn-edit:hover { background: #ffb800; color: white; }

        .btn-migrate { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.3); }
        .btn-migrate:hover { background: #3b82f6; color: white; }

        .input-group { position: relative; margin-bottom: 20px; }
        .eye-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); font-size: 1.2rem; }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.3s; padding: 20px; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal { background: var(--slate-gray); width: 100%; max-width: 500px; padding: 30px; border-radius: 20px; border: 1px solid var(--border-glass); }
        .modal h3 { color: white; margin-bottom: 20px; }
        .modal label { display: block; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 8px; font-weight: 600; }
        .modal input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass); padding: 12px; border-radius: 8px; color: white; margin-bottom: 16px; font-family: inherit; }
        
        .hidden { display: none !important; }
        
        .toast {
            position: fixed; bottom: 20px; right: 20px;
            background: var(--emerald-green); color: white;
            padding: 12px 24px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: translateY(100px); opacity: 0;
            transition: 0.3s; font-weight: 600; z-index: 9999;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <!-- Login Area -->
    <div id="login-area" class="login-box">
        <h2 style="margin-bottom: 20px; color: white;">Admin Login</h2>
        <div class="input-group">
            <input type="password" id="admin-pass" class="form-input" placeholder="Masukkan Password Admin..." style="width: 100%; padding-right: 40px; text-align: center;">
            <span class="eye-icon" onclick="togglePassword()">👁️</span>
        </div>
        <button onclick="login()" class="btn-primary" style="width: 100%; padding: 14px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold;">Masuk Dashboard</button>
        <p id="login-error" style="color: #ff5f56; margin-top: 15px; font-size: 0.9rem; display: none;">Password salah!</p>
    </div>

    <!-- Dashboard Area -->
    <div id="dashboard-area" class="admin-container hidden">
        <div class="admin-header">
            <div>
                <h1>Data <span class="accent">Usulan</span></h1>
                <p style="color: var(--text-muted);">Review kosakata yang dikirim oleh audiens sebelum dimasukkan ke "kamus.json".</p>
            </div>
            <div style="display: flex; gap: 12px; flex-wrap: wrap; justify-content: flex-end;">
                <button onclick="migrateKamus()" class="btn-sm btn-migrate">🚀 Migrasi kamus.json ke Supabase</button>
                <button onclick="fetchData()" class="btn-sm btn-secondary" style="background: transparent; border-color: var(--text-muted); color: var(--text-muted);">Refresh Data</button>
                <button onclick="generateJson()" class="btn-sm btn-copy">📋 Copy Formatted JSON</button>
            </div>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th width="5%">ID</th>
                        <th width="15%">Pengusul</th>
                        <th width="15%">B. Indonesia</th>
                        <th width="15%">B. PALI</th>
                        <th width="30%">Contoh Kalimat</th>
                        <th width="20%">Aksi</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr>
                        <td colspan="6" style="text-align: center; padding: 30px; color: var(--text-muted);">Menunggu data / Sedang memuat...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal-overlay">
        <div class="modal">
            <h3>Edit Usulan Kosakata</h3>
            <input type="hidden" id="edit-id">
            <label>B. Indonesia</label>
            <input type="text" id="edit-indo">
            <label>B. PALI</label>
            <input type="text" id="edit-dusun">
            <label>Contoh ID</label>
            <input type="text" id="edit-contoh-id">
            <label>Contoh PALI</label>
            <input type="text" id="edit-contoh-dusun">
            
            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button onclick="saveEdit()" class="btn-sm btn-copy" style="flex: 1; padding: 12px;">Simpan Perubahan</button>
                <button onclick="closeEditModal()" class="btn-sm btn-secondary" style="flex: 1; padding: 12px; background: transparent; border-color: var(--text-muted); color: var(--text-muted);">Batal</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">Sukses</div>

    <script>
        let adminPassword = '';
        let allData = [];

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.background = isError ? '#ff5f56' : 'var(--emerald-green)';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function togglePassword() {
            const input = document.getElementById('admin-pass');
            if (input.type === 'password') {
                input.type = 'text';
            } else {
                input.type = 'password';
            }
        }

        async function login() {
            const pass = document.getElementById('admin-pass').value;
            adminPassword = pass; 
            
            const btn = document.querySelector('.btn-primary');
            btn.textContent = "Mengecek...";
            
            await fetchData();
            btn.textContent = "Masuk Dashboard";
        }

        async function postAction(action, payload = {}) {
            const res = await fetch('/api/admin-usulan', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'x-admin-password': adminPassword
                },
                body: JSON.stringify({ action, payload })
            });
            return await res.json();
        }

        async function fetchData() {
            try {
                const res = await fetch('/api/admin-usulan', {
                    method: 'GET',
                    headers: { 'x-admin-password': adminPassword }
                });
                
                const json = await res.json();
                
                if (res.status === 401) {
                    document.getElementById('login-error').style.display = 'block';
                    return;
                }

                if (json.success) {
                    document.getElementById('login-area').classList.add('hidden');
                    document.getElementById('dashboard-area').classList.remove('hidden');
                    allData = json.data;
                    renderTable();
                } else {
                    showToast(json.message, true);
                }
            } catch (err) {
                showToast("Koneksi gagal", true);
            }
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            
            if (allData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px;">Belum ada usulan kosakata baru.</td></tr>';
                return;
            }

            let html = '';
            allData.forEach(item => {
                let examplesHTML = '';
                if(item.contoh_id) examplesHTML += `<div style="font-size:0.85rem; margin-bottom:4px"><b>ID:</b> ${item.contoh_id}</div>`;
                if(item.contoh_dusun) examplesHTML += `<div style="font-size:0.85rem;"><b>PALI:</b> ${item.contoh_dusun}</div>`;
                if(!examplesHTML) examplesHTML = '<span style="color:var(--text-muted); font-size:0.85rem; font-style:italic;">-- Tidak ada contoh --</span>';

                html += `
                    <tr>
                        <td style="color: var(--text-muted)">#${item.id}</td>
                        <td style="font-weight: 600;">${item.nama}</td>
                        <td>${item.indonesia}</td>
                        <td><span style="color: var(--emerald-green); font-weight: 700;">${item.dusun}</span></td>
                        <td>${examplesHTML}</td>
                        <td style="display: flex; gap: 6px; flex-wrap: wrap;">
                            <button onclick='openEditModal(${JSON.stringify(item)})' class="btn-sm btn-edit">✏️ Edit</button>
                            <button onclick="approveRow(${item.id})" class="btn-sm btn-approve">✅ Approve</button>
                            <button onclick="deleteRow(${item.id})" class="btn-sm btn-danger">🗑 Hapus</button>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        // --- Migrate Kamus ---
        async function migrateKamus() {
            if(!confirm("Yakin ingin migrasi semua data kamus.json ke tabel kamus_utama Supabase sekarang?")) return;
            showToast("Memproses migrasi...");
            try {
                const json = await postAction('MIGRATE_KAMUS');
                if(json.success) showToast(json.message);
                else showToast(json.message, true);
            } catch (err) {
                showToast("Gagal melakukan migrasi", true);
            }
        }

        // --- Edit Modal Logic ---
        function openEditModal(item) {
            document.getElementById('edit-modal').classList.add('active');
            document.getElementById('edit-id').value = item.id;
            document.getElementById('edit-indo').value = item.indonesia;
            document.getElementById('edit-dusun').value = item.dusun;
            document.getElementById('edit-contoh-id').value = item.contoh_id || '';
            document.getElementById('edit-contoh-dusun').value = item.contoh_dusun || '';
        }

        function closeEditModal() {
            document.getElementById('edit-modal').classList.remove('active');
        }

        async function saveEdit() {
            const payload = {
                id: document.getElementById('edit-id').value,
                indonesia: document.getElementById('edit-indo').value,
                dusun: document.getElementById('edit-dusun').value,
                contoh_id: document.getElementById('edit-contoh-id').value,
                contoh_dusun: document.getElementById('edit-contoh-dusun').value
            };

            showToast("Menyimpan...");
            try {
                const json = await postAction('EDIT_USULAN', payload);
                if (json.success) {
                    showToast(json.message);
                    closeEditModal();
                    fetchData();
                } else {
                    showToast(json.message, true);
                }
            } catch (err) {
                showToast("Gagal mengupdate", true);
            }
        }

        // --- Approve Logic ---
        async function approveRow(id) {
            if(!confirm("Approve usulan ini? (Akan dimasukkan ke Supabase 'kamus_utama' dan dihapus dari sini)")) return;
            
            const item = allData.find(i => i.id === id);
            
            showToast("Sedang Approve...");
            try {
                const json = await postAction('APPROVE_USULAN', item);
                if (json.success) {
                    showToast(json.message);
                    fetchData();
                } else {
                    showToast(json.message, true);
                }
            } catch (err) {
                showToast("Gagal approve", true);
            }
        }

        async function deleteRow(id) {
            if(!confirm("Yakin ingin menghapus usulan ini? Jika ini typo/spam silakan hapus.")) return;

            try {
                const res = await fetch('/api/admin-usulan', {
                    method: 'DELETE',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-admin-password': adminPassword
                    },
                    body: JSON.stringify({ id })
                });
                const json = await res.json();
                
                if (json.success) {
                    showToast("Berhasil dihapus!");
                    allData = allData.filter(item => item.id !== id);
                    renderTable();
                } else {
                    showToast(json.message, true);
                }
            } catch (err) {
                showToast("Gagal menghapus", true);
            }
        }

        function generateJson() {
            if(allData.length === 0) {
                showToast("Data masih kosong!", true);
                return;
            }

            // Map untuk menyesuaikan structure kamus.json (tanpa ID/Nama)
            const cleanData = allData.map(item => {
                return {
                    indonesia: item.indonesia,
                    dusun: item.dusun,
                    contoh_id: item.contoh_id || "",
                    contoh_dusun: item.contoh_dusun || ""
                };
            });

            // Parse jadi text + buat indentasi rapi
            const jsonText = JSON.stringify(cleanData, null, 2);

            // Copy to clipboard
            navigator.clipboard.writeText(jsonText).then(() => {
                showToast("JSON berhasil di-copy! Silakan paste ke kamus.json");
            }).catch(() => {
                showToast("Gagal copy ke clipboard", true);
            });
        }
    </script>
</body>
</html>
